<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatSaid — AI Audio Transcription with Speaker Labels</title>
    <meta name="description" content="Upload audio files and get instant transcriptions with speaker labels, summaries, and custom AI analysis. Supports .m4a, .mp3, .wav. No subscription required.">
    <meta name="author" content="WhatSaid" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#6054ba">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#6054ba">

    <!--
      Font loading strategy:
      - @font-face declarations in src/index.css already use `font-display: swap`,
        so text renders immediately in the fallback and swaps when Inter loads.
      - The upright Inter woff2 is preloaded from src/main.tsx (import-based) so
        the file's content-hashed URL stays correct across Vite builds. Hardcoding
        a `<link rel="preload" href="/assets/InterVariable-*.woff2">` here would
        404 on every rebuild because the hash changes.
      - Inter Italic is intentionally NOT preloaded; it is rarely used above-the-fold.
    -->

    <!-- Preconnect to backend origin so the first auth/session request is faster.
         Same-origin assets do not need preconnect. -->
    <link rel="preconnect" href="https://gidjkdtmagxuzhlntlbt.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://gidjkdtmagxuzhlntlbt.supabase.co">

    <script>
      // System preference dark mode — no toggle, follows OS
      (function () {
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          document.documentElement.classList.toggle('dark', e.matches);
        });
      })();
    </script>

    <!-- Site-wide structured data: Organization + WebSite.
         Page-specific schemas (SoftwareApplication, FAQPage, Product) are injected
         per-route by the <JsonLd /> React component. Keep this graph stable. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://whatsaid.app/#organization",
          "name": "WhatSaid",
          "alternateName": "WhatSaid Audio Transcription",
          "url": "https://whatsaid.app/",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://whatsaid.app/#logo",
            "url": "https://whatsaid.app/favicon-512.png",
            "width": 512,
            "height": 512,
            "caption": "WhatSaid"
          },
          "image": { "@id": "https://whatsaid.app/#logo" },
          "description": "WhatSaid converts audio recordings into transcripts, summaries, key actions, and custom AI answers — with speaker labels and automatic language detection."
        },
        {
          "@type": "WebSite",
          "@id": "https://whatsaid.app/#website",
          "name": "WhatSaid",
          "alternateName": "WhatSaid — AI Audio Transcription",
          "url": "https://whatsaid.app/",
          "description": "Upload audio and get instant transcripts with speaker labels, structured summaries, and custom AI analysis. Supports .m4a, .mp3, .wav.",
          "inLanguage": "en",
          "publisher": { "@id": "https://whatsaid.app/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://whatsaid.app/help?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
</head>

  <body>
    <noscript>

        <p>Upload .m4a, .mp3, or .wav recordings and get instant transcripts, structured summaries, key actions, and custom AI answers. No subscription — pay-as-you-go credits.</p>

        <ul>
          <li><a href="/">Home</a></li>

          <li><a href="/pricing">Pricing</a></li>
          <li><a href="/help">Help &amp; FAQ</a></li>
        </ul>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
